<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unduh FiberOps Technician - Playstore</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS Link -->
    <link rel="stylesheet" href="style.css?v=2.0">
    
    <!-- Ionicons Script -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        
        .playstore-card {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 50px 40px;
            max-width: 500px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .playstore-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        
        .playstore-icon {
            font-size: 80px;
            color: var(--primary);
            margin-bottom: 24px;
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.2));
            animation: floatIcon 4s ease-in-out infinite;
        }
        
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: white;
            font-weight: 700;
        }
        
        p {
            font-family: var(--font-body);
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 35px;
            font-size: 0.95rem;
        }
        
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 50px;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .btn-back:hover {
            background: rgba(0, 242, 254, 0.05);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
            transform: translateY(-2px);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Background Tech Overlays -->
    <div class="mouse-glow" id="mouse-glow"></div>
    <div class="grid-overlay"></div>
    <div class="blob blob-cyan"></div>
    <div class="blob blob-purple"></div>

    <div class="playstore-card">
        <ion-icon name="logo-google-playstore" class="playstore-icon"></ion-icon>
        <h1>Aplikasi Khusus Mobile</h1>
        <p>Aplikasi <strong>FiberOps Technician</strong> dirancang khusus untuk perangkat seluler. Silakan unduh dan instal aplikasi ini langsung melalui Google Play Store di HP Android Anda.</p>
        <a href="index.html" class="btn-back"><ion-icon name="arrow-back-outline"></ion-icon> Kembali ke Beranda</a>
    </div>

    <!-- Custom Script -->
    <script src="script.js?v=2.0"></script>
</body>
</html>
